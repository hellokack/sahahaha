name: 8주차 최적화된 CI/CD 파이프라인

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Week08/**' # 🔥 최적화 핵심 3: Week08 폴더 내용이 바뀔 때만 작동합니다! (선택적 실행)
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. 재사용 워크플로우 호출 (Build & Test)
  call-reusable-test:
    uses: ./.github/workflows/reusable-test.yml

  # 2. 조건부 배포 (PR일 때는 무시하고, main에 push될 때만 실행)
  conditional-deploy:
    needs: call-reusable-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: 서버 배포 실행
        run: echo "🚀 메인 브랜치 푸시 감지 완료: 조건부 배포를 성공적으로 수행합니다!"