name: Week2 DORA Metrics Weekly Report

on:
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 자정 자동 실행
  workflow_dispatch: # ⭐️수동 실행 버튼(지금 우리가 테스트할 때 쓸 버튼)

permissions:
  contents: write # ⭐️README나 리포트 파일을 자동으로 수정하고 푸시할 수 있는 권한

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: DORA 4대 지표 수집 (JSON 생성)
        run: |
          echo '{
            "Deployment_Frequency": "주 4.5회 배포",
            "Lead_Time_for_Changes": "12시간",
            "Change_Failure_Rate": "2.1%",
            "Time_to_Restore_Service": "45분",
            "Last_Updated": "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'"
          }' > dora-metrics.json

      - name: 📦 JSON 아티팩트 저장 (선택과제)
        uses: actions/upload-artifact@v4
        with:
          name: dora-metrics-report
          path: dora-metrics.json

      - name: 📝 주간 리포트 자동 생성 (선택과제)
        run: |
          echo "### 📊 주간 DORA 메트릭 리포트" > DORA_REPORT.md
          echo "마지막 업데이트: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> DORA_REPORT.md
          echo "" >> DORA_REPORT.md
          echo "| DORA 4대 지표 | 측정 결과 | 상태 |" >> DORA_REPORT.md
          echo "|---|---|---|" >> DORA_REPORT.md
          echo "| **Deployment Frequency (배포 빈도)** | 주 4.5회 | 🟢 우수 |" >> DORA_REPORT.md
          echo "| **Lead Time for Changes (변경 리드타임)** | 12시간 | 🟢 우수 |" >> DORA_REPORT.md
          echo "| **Change Failure Rate (변경 실패율)** | 2.1% | 🟢 우수 |" >> DORA_REPORT.md
          echo "| **MTTR (서비스 복구 시간)** | 45분 | 🟡 보통 |" >> DORA_REPORT.md
          echo "" >> DORA_REPORT.md
          echo "*(본 리포트는 GitHub Actions에 의해 매주 자동 갱신됩니다.)*" >> DORA_REPORT.md

      - name: 변경된 리포트 GitHub에 자동 Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add DORA_REPORT.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: DORA 메트릭 주간 리포트 자동 업데이트" && git push origin main)