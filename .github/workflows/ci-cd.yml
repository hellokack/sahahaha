name: 7주차 CI/CD 워크플로우

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. Build & Test 잡 (Matrix 전략으로 여러 버전/OS 테스트)
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: 1. 저장소 코드 불러오기
        uses: actions/checkout@v3

      - name: 2. Python ${{ matrix.python-version }} 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: 3. 패키지 설치
        run: |
          cd Week07
          pip install -r requirements.txt

      - name: 4. Lint 검사 (flake8)
        run: |
          cd Week07
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 5. Test 실행 (pytest) 및 결과 저장
        run: |
          cd Week07
          pytest > test-results.txt

      - name: 6. 테스트 결과 아티팩트(Artifact) 업로드
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v3
        with:
          name: test-results-artifact
          path: Week07/test-results.txt

  # 2. Deploy 잡 (Build가 성공해야 실행, Secrets 주입, 아티팩트 다운로드)
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: 1. 테스트 결과 아티팩트 다운로드
        uses: actions/download-artifact@v3
        with:
          name: test-results-artifact

      - name: 2. 배포 진행 및 Secrets 확인
        env: # GitHub Secrets 주입
          MY_SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}
        run: |
          echo "📥 다운로드된 테스트 결과:"
          cat test-results.txt
          echo "--------------------------------"
          echo "🚀 서버에 배포를 시작합니다..."
          echo "보안 키(Secret)가 성공적으로 주입되었습니다! (길이: ${#MY_SECRET_KEY})"
          echo "🎉 사하구청 AI 챗봇 배포 완료!"