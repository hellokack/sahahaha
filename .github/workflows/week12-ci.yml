name: Week12 Shift-Left Test CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 의존성 설치 및 테스트 실행 (커버리지 측정)
        run: |
          cd Week12
          npm install
          npm run test:coverage