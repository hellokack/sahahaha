<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사하구청 AI 상담사</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="chat-app">
        <header class="chat-header">
            <div class="header-left">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                    </svg>
                </div>
                <div class="header-title">
                    <h1>사하구청 AI 상담사</h1>
                    <span class="header-subtitle">부산광역시 사하구 공식 정보 안내</span>
                </div>
            </div>
            
            <div class="header-actions">
                <div class="settings-container">
                    <button id="btn-settings" class="btn-icon" title="설정">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                    <div id="settings-menu" class="settings-dropdown hidden">
                        <div class="setting-item">
                            <span>다크 모드</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="theme-toggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <span>글자 크기</span>
                            <div class="font-size-controls">
                                <button id="btn-font-dec" class="font-btn" title="작게">A-</button>
                                <span id="font-size-display">기본</span>
                                <button id="btn-font-inc" class="font-btn" title="크게">A+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <button id="btn-clear" class="btn-icon" title="대화 초기화">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                </button>
            </div>
        </header>

        <div id="chat-messages" class="chat-messages">
            <div class="message bot-message welcome-message">
                <div class="message-avatar">
                    <img src="/static/images/mascot_neutral.png" class="bot-avatar-img" alt="로봇">
                </div>
                <div class="message-content">
                    <div class="message-bubble">
                        <p>안녕하세요! <strong>사하구청 AI 상담사</strong>입니다.</p>
                        <p>사하구 행정 서비스, 민원, 복지 등 궁금한 점을 물어보세요.</p>
                        <div class="quick-actions">
                            <button class="quick-btn" data-msg="사하구청 위치와 연락처 알려줘">구청 위치/연락처</button>
                            <button class="quick-btn" data-msg="복지 서비스 안내해줘">복지 서비스</button>
                            <button class="quick-btn" data-msg="주민등록등본 발급 방법 알려줘">민원 발급</button>
                            <button class="quick-btn" data-msg="대형 폐기물 배출 방법 알려줘">분리수거 안내</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="궁금한 점을 입력하세요..." rows="1"></textarea>
                
                <button id="btn-mic" class="btn-mic" type="button" title="음성으로 말하기"></button>
                
                <button id="btn-send" class="btn-send" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="input-notice">
                사하구청 공식 정보 기반 답변 | 개인정보를 입력하지 마세요
            </div>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
