<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 상담 챗봇</title>
    <style>
        body { font-family: sans-serif; background-color: #f3e8ff; display: flex; justify-content: center; padding: 50px; }
        .chat-box { width: 400px; background: white; border: 2px solid #9333ea; border-radius: 10px; padding: 20px; }
        .header { text-align: center; color: #7e22ce; font-weight: bold; font-size: 20px; margin-bottom: 20px; }
        .message { background-color: #d8b4fe; padding: 10px; border-radius: 8px; margin-bottom: 10px; color: #4c1d95; }
    </style>
</head>
<body>
    <div class="chat-box">
        <div class="header">🍇 사하구청 AI 상담사</div>
        <div class="message">안녕하세요! 무엇을 도와드릴까요?</div>
    </div>
</body>
</html>
