services:
  - type: web
    name: sahaha-final-ai
    env: python
    plan: free
    rootDir: Week14_Final_SahahaAI
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
